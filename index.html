<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHTV — Official Store</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --black: #000000; --white: #ffffff; --gray: #888888; --light-gray: #f5f5f5;
            --font-display: 'Bebas Neue', sans-serif; --font-body: 'Inter', sans-serif;
        }
        html { scroll-behavior: smooth; }
        body { font-family: var(--font-body); background: var(--black); color: var(--white); overflow-x: hidden; }

        /* ===== NAVIGATION ===== */
        .nav {
            position: fixed; top: 0; left: 0; width: 100%; z-index: 1000;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 32px; height: 64px;
            background: rgba(0,0,0,0.4); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255,255,255,0.08); transition: all 0.4s ease;
        }
        .nav-left { display: flex; align-items: center; gap: 28px; flex: 1; }
        .nav-hamburger {
            background: none; border: none; cursor: pointer; padding: 4px;
            display: flex; flex-direction: column; gap: 5px;
        }
        .nav-hamburger span { display: block; width: 22px; height: 1.5px; background: var(--white); transition: all 0.3s; }
        .nav-categories { display: flex; gap: 28px; }
        .nav-categories a {
            font-family: var(--font-display); font-size: 13px; letter-spacing: 2.5px;
            color: var(--white); text-decoration: none; text-transform: uppercase;
            opacity: 0.85; transition: opacity 0.3s; white-space: nowrap;
        }
        .nav-categories a:hover { opacity: 1; }
        .nav-center { position: absolute; left: 50%; transform: translateX(-50%); display: flex; align-items: center; justify-content: center; }
        .nav-logo-img { height: 32px; width: auto; cursor: pointer; transition: opacity 0.3s; }
        .nav-logo-img:hover { opacity: 0.8; }
        .nav-right { display: flex; align-items: center; gap: 24px; flex: 1; justify-content: flex-end; }
        .nav-link {
            font-family: var(--font-display); font-size: 13px; letter-spacing: 2px;
            color: var(--white); text-decoration: none; text-transform: uppercase;
            opacity: 0.85; transition: opacity 0.3s; white-space: nowrap;
            background: none; border: none; cursor: pointer; display: flex; align-items: center; gap: 6px;
        }
        .nav-link:hover { opacity: 1; }
        .nav-link svg { width: 10px; height: 10px; stroke: var(--white); fill: none; stroke-width: 2; }
        .nav-icon-btn { background: none; border: none; cursor: pointer; padding: 4px; position: relative; color: var(--white); }
        .nav-icon-btn svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 1.5; }
        .cart-count {
            position: absolute; top: -6px; right: -6px; background: var(--white); color: var(--black);
            font-size: 9px; font-weight: 700; width: 16px; height: 16px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
        }
        @media (max-width: 1024px) { .nav-categories { display: none; } .nav-link { display: none; } .nav { padding: 0 20px; } }
        @media (max-width: 640px) { .nav-right { gap: 16px; } }

        /* ===== HERO ===== */
        .hero {
            position: relative; width: 100%; height: 100vh; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }
        .hero-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://images.unsplash.com/photo-1556906781-9a412961c28c?q=80&w=2574&auto=format&fit=crop') center/cover no-repeat;
            filter: brightness(0.35);
        }
        .hero-content { position: relative; z-index: 2; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 24px; }
        .hero-logo { width: clamp(220px, 40vw, 560px); height: auto; }
        .hero-tagline { font-family: var(--font-display); font-size: clamp(14px, 2vw, 18px); letter-spacing: 6px; color: var(--white); text-transform: uppercase; opacity: 0.7; }
        .scroll-indicator {
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); z-index: 2;
            animation: bounce 2.5s infinite; display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer;
        }
        .scroll-indicator span { font-family: var(--font-display); font-size: 11px; letter-spacing: 3px; color: var(--white); opacity: 0.6; text-transform: uppercase; }
        .scroll-indicator svg { width: 24px; height: 24px; stroke: var(--white); fill: none; stroke-width: 1.5; opacity: 0.6; }
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateX(-50%) translateY(0); }
            40% { transform: translateX(-50%) translateY(-12px); }
            60% { transform: translateX(-50%) translateY(-6px); }
        }

        /* ===== SHOP ===== */
        .shop { background: var(--black); min-height: 100vh; padding: 100px 32px 80px; }
        .shop-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 48px; flex-wrap: wrap; gap: 16px; }
        .shop-title { font-family: var(--font-display); font-size: 14px; letter-spacing: 3px; color: var(--gray); text-transform: uppercase; }
        .shop-filters { display: flex; gap: 32px; flex-wrap: wrap; }
        .filter-link {
            font-family: var(--font-display); font-size: 14px; letter-spacing: 2px; color: var(--gray);
            text-transform: uppercase; cursor: pointer; transition: color 0.3s; background: none; border: none;
        }
        .filter-link:hover, .filter-link.active { color: var(--white); }
        .product-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; }
        @media (max-width: 1024px) { .product-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 640px) { .product-grid { grid-template-columns: 1fr; } .shop { padding: 80px 16px 60px; } }

        .product-card { cursor: pointer; transition: transform 0.3s ease; }
        .product-card:hover { transform: translateY(-4px); }
        .product-card:hover .product-img { filter: brightness(1.1); transform: scale(1.02); }
        .product-img-wrap { position: relative; width: 100%; aspect-ratio: 1; background: #111; overflow: hidden; margin-bottom: 16px; }
        .product-img { width: 100%; height: 100%; object-fit: cover; transition: filter 0.3s ease, transform 0.5s ease; }
        .product-name { font-family: var(--font-display); font-size: 18px; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 4px; line-height: 1.2; }
        .product-price { font-family: var(--font-body); font-size: 14px; font-weight: 600; color: var(--gray); }

        /* ===== PRODUCT DETAIL ===== */
        .product-detail {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--white); z-index: 2000; display: none; overflow-y: auto;
        }
        .product-detail.active { display: block; animation: slideUp 0.4s ease; }
        @keyframes slideUp { from { transform: translateY(40px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .pd-inner { min-height: 100vh; display: grid; grid-template-columns: 1.2fr 1fr; gap: 0; }
        @media (max-width: 1024px) { .pd-inner { grid-template-columns: 1fr; } }
        .pd-gallery { background: var(--light-gray); display: flex; align-items: center; justify-content: center; padding: 80px 40px; position: relative; }
        .pd-img { max-width: 100%; max-height: 70vh; object-fit: contain; filter: drop-shadow(0 20px 40px rgba(0,0,0,0.15)); }
        .pd-info { padding: 80px 60px; display: flex; flex-direction: column; justify-content: center; }
        @media (max-width: 1024px) { .pd-info { padding: 40px 24px 80px; } .pd-gallery { padding: 100px 24px 40px; } }
        .pd-close { position: absolute; top: 24px; right: 32px; background: none; border: none; cursor: pointer; z-index: 10; padding: 8px; }
        .pd-close svg { width: 28px; height: 28px; stroke: var(--black); stroke-width: 1.5; }
        .pd-category { font-family: var(--font-display); font-size: 13px; letter-spacing: 3px; color: var(--gray); text-transform: uppercase; margin-bottom: 12px; }
        .pd-name { font-family: var(--font-display); font-size: clamp(32px, 5vw, 56px); letter-spacing: 2px; color: var(--black); text-transform: uppercase; line-height: 1; margin-bottom: 16px; }
        .pd-price { font-family: var(--font-body); font-size: 20px; font-weight: 600; color: var(--black); margin-bottom: 48px; }
        .pd-label { font-family: var(--font-display); font-size: 12px; letter-spacing: 2px; color: var(--gray); text-transform: uppercase; margin-bottom: 12px; }
        .pd-sizes { display: flex; gap: 8px; margin-bottom: 40px; flex-wrap: wrap; }
        .size-btn { width: 48px; height: 48px; border: 1px solid #ddd; background: var(--white); font-family: var(--font-body); font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s; color: var(--black); }
        .size-btn:hover { border-color: var(--black); }
        .size-btn.active { background: var(--black); color: var(--white); border-color: var(--black); }
        .pd-actions { display: flex; gap: 16px; margin-bottom: 48px; }
        .qty-selector { display: flex; align-items: center; border: 1px solid #ddd; height: 56px; }
        .qty-btn { width: 48px; height: 100%; background: none; border: none; font-size: 18px; cursor: pointer; color: var(--black); }
        .qty-value { width: 48px; text-align: center; font-weight: 600; font-size: 14px; color: var(--black); }
        .add-cart-btn { flex: 1; height: 56px; background: var(--black); color: var(--white); border: none; font-family: var(--font-body); font-size: 13px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; transition: opacity 0.3s; }
        .add-cart-btn:hover { opacity: 0.85; }
        .pd-desc { font-size: 14px; line-height: 1.7; color: var(--gray); max-width: 400px; }

        /* ===== CART DRAWER ===== */
        .cart-drawer { position: fixed; top: 0; right: -420px; width: 420px; max-width: 100%; height: 100%; background: var(--white); z-index: 3000; transition: right 0.4s ease; display: flex; flex-direction: column; }
        .cart-drawer.open { right: 0; }
        .cart-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 2500; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
        .cart-overlay.open { opacity: 1; pointer-events: all; }
        .cart-header { display: flex; justify-content: space-between; align-items: center; padding: 24px 32px; border-bottom: 1px solid #eee; }
        .cart-title { font-family: var(--font-display); font-size: 20px; letter-spacing: 2px; color: var(--black); }
        .cart-close { background: none; border: none; cursor: pointer; }
        .cart-close svg { width: 24px; height: 24px; stroke: var(--black); stroke-width: 1.5; }
        .cart-items { flex: 1; overflow-y: auto; padding: 24px 32px; }
        .cart-empty { text-align: center; color: var(--gray); font-size: 14px; margin-top: 40px; }
        .cart-item { display: flex; gap: 16px; margin-bottom: 24px; padding-bottom: 24px; border-bottom: 1px solid #eee; }
        .cart-item-img { width: 80px; height: 80px; object-fit: cover; background: var(--light-gray); }
        .cart-item-info { flex: 1; }
        .cart-item-name { font-family: var(--font-display); font-size: 16px; letter-spacing: 1px; color: var(--black); margin-bottom: 4px; }
        .cart-item-meta { font-size: 12px; color: var(--gray); margin-bottom: 8px; }
        .cart-item-price { font-weight: 600; font-size: 14px; color: var(--black); }
        .cart-footer { padding: 24px 32px; border-top: 1px solid #eee; }
        .cart-subtotal { display: flex; justify-content: space-between; margin-bottom: 16px; font-family: var(--font-display); font-size: 18px; letter-spacing: 1px; color: var(--black); }
        .checkout-btn { width: 100%; height: 56px; background: var(--black); color: var(--white); border: none; font-family: var(--font-body); font-size: 13px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; }

        /* ===== MOBILE MENU ===== */
        .mobile-menu { position: fixed; top: 0; left: -100%; width: 100%; height: 100%; background: var(--black); z-index: 3000; transition: left 0.4s ease; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 32px; }
        .mobile-menu.open { left: 0; }
        .mobile-menu a { font-family: var(--font-display); font-size: 32px; letter-spacing: 3px; color: var(--white); text-decoration: none; text-transform: uppercase; transition: opacity 0.3s; }
        .mobile-menu a:hover { opacity: 0.6; }
        .menu-close { position: absolute; top: 20px; left: 32px; background: none; border: none; cursor: pointer; }
        .menu-close svg { width: 28px; height: 28px; stroke: var(--white); stroke-width: 1.5; }
    </style>

            <p class="hero-tagline">Official Store</p>
        </div>
        <div class="scroll-indicator" onclick="scrollToShop()">
            <span>Scroll</span>
            <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12l7 7 7-7"/></svg>
        </div>
    </section>

    <!-- Shop -->
    <section class="shop" id="shop">
        <div class="shop-header">
            <span class="shop-title">All Products</span>
            <div class="shop-filters">
                <button class="filter-link active" onclick="filterProducts('all', this)">All</button>
                <button class="filter-link" onclick="filterProducts('Tops', this)">Tops</button>
                <button class="filter-link" onclick="filterProducts('Bottoms', this)">Bottoms</button>
                <button class="filter-link" onclick="filterProducts('Accessories', this)">Accessories</button>
            </div>
        </div>
        <div class="product-grid" id="productGrid"></div>
    </section>

    <!-- Product Detail -->
    <div class="product-detail" id="productDetail">
        <button class="pd-close" onclick="closeProduct()">
            <svg viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </button>
        <div class="pd-inner" id="pdInner"></div>
    </div>

    <script>
        const products = [
            { id: 1, name: "Allstars Football Jersey", price: 75, category: "Tops", image: "https://placehold.co/600x600/111/fff?text=JERSEY+01", sizes: ["S","M","L","XL"] },
            { id: 2, name: "Reversible Bolt Jersey", price: 80, category: "Tops", image: "https://placehold.co/600x600/1a1a1a/fff?text=JERSEY+02", sizes: ["S","M","L","XL"] },
            { id: 3, name: "England Allstars Jersey", price: 75, category: "Tops", image: "https://placehold.co/600x600/222/fff?text=JERSEY+03", sizes: ["S","M","L","XL"] },
            { id: 4, name: "Oversized Hoodie Black", price: 95, category: "Tops", image: "https://placehold.co/600x600/0a0a0a/fff?text=HOODIE+01", sizes: ["S","M","L","XL"] },
            { id: 5, name: "Cargo Pants V2", price: 110, category: "Bottoms", image: "https://placehold.co/600x600/151515/fff?text=CARGO+01", sizes: ["28","30","32","34","36"] },
            { id: 6, name: "Track Jacket", price: 120, category: "Tops", image: "https://placehold.co/600x600/1f1f1f/fff?text=JACKET+01", sizes: ["S","M","L","XL"] },
            { id: 7, name: "Mesh Shorts", price: 55, category: "Bottoms", image: "https://placehold.co/600x600/181818/fff?text=SHORTS+01", sizes: ["S","M","L","XL"] },
            { id: 8, name: "Logo Beanie", price: 35, category: "Accessories", image: "https://placehold.co/600x600/111/fff?text=BEANIE+01", sizes: ["ONE SIZE"] },
            { id: 9, name: "Crossbody Bag", price: 65, category: "Accessories", image: "https://placehold.co/600x600/222/fff?text=BAG+01", sizes: ["ONE SIZE"] },
        ];

        let cart = [], currentProduct = null, selectedSize = null, currentQty = 1, currentFilter = 'all';

        function renderShop(filter = 'all') {
            const grid = document.getElementById('productGrid');
            const filtered = filter === 'all' ? products : products.filter(p => p.category === filter);
            grid.innerHTML = filtered.map(p => `
                <div class="product-card" onclick="openProduct(${p.id})">
                    <div class="product-img-wrap"><img src="${p.image}" alt="${p.name}" class="product-img" loading="lazy"></div>
                    <div class="product-name">${p.name}</div>
                    <div class="product-price">$${p.price.toFixed(2)}</div>
                </div>
            `).join('');
        }

        function filterProducts(category, btn) {
            currentFilter = category;
            document.querySelectorAll('.filter-link').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderShop(category);
        }

        function scrollToShop() {
            document.getElementById('shop').scrollIntoView({ behavior: 'smooth' });
        }

        function openProduct(id) {
            currentProduct = products.find(p => p.id === id);
            selectedSize = currentProduct.sizes[0]; currentQty = 1;
            document.getElementById('pdInner').innerHTML = `
                <div class="pd-gallery"><img src="${currentProduct.image}" alt="${currentProduct.name}" class="pd-img"></div>
                <div class="pd-info">
                    <div class="pd-category">${currentProduct.category}</div>
                    <h1 class="pd-name">${currentProduct.name}</h1>
                    <div class="pd-price">$${currentProduct.price.toFixed(2)}</div>
                    <div class="pd-label">Select Size</div>
                    <div class="pd-sizes">
                        ${currentProduct.sizes.map(s => `<button class="size-btn ${s === selectedSize ? 'active' : ''}" onclick="selectSize('${s}', this)">${s}</button>`).join('')}
                    </div>
                    <div class="pd-actions">
                        <div class="qty-selector">
                            <button class="qty-btn" onclick="changeQty(-1)">−</button>
                            <div class="qty-value" id="qtyValue">1</div>
                            <button class="qty-btn" onclick="changeQty(1)">+</button>
                        </div>
                        <button class="add-cart-btn" onclick="addToCart()">Add to Cart</button>
                    </div>
                    <p class="pd-desc">Premium streetwear piece crafted for everyday wear. Oversized fit with heavyweight fabric. Designed and produced in-house.</p>
                </div>`;
            document.getElementById('productDetail').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeProduct() { document.getElementById('productDetail').classList.remove('active'); document.body.style.overflow = ''; }
        function selectSize(size, btn) { selectedSize = size; document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); }
        function changeQty(delta) { currentQty = Math.max(1, currentQty + delta); document.getElementById('qtyValue').textContent = currentQty; }

        function addToCart() {
            const existing = cart.find(item => item.id === currentProduct.id && item.size === selectedSize);
            if (existing) existing.qty += currentQty;
            else cart.push({ id: currentProduct.id, name: currentProduct.name, price: currentProduct.price, size: selectedSize, qty: currentQty, image: currentProduct.image });
            updateCart(); toggleCart(); closeProduct();
        }

        function updateCart() {
            const count = cart.reduce((sum, item) => sum + item.qty, 0);
            const countEl = document.getElementById('cartCount');
            countEl.textContent = count; countEl.style.display = count > 0 ? 'flex' : 'none';
            const itemsContainer = document.getElementById('cartItems');
            const footer = document.getElementById('cartFooter');
            if (cart.length === 0) { itemsContainer.innerHTML = '<div class="cart-empty">Your bag is empty</div>'; footer.style.display = 'none'; return; }
            footer.style.display = 'block';
            itemsContainer.innerHTML = cart.map(item => `
                <div class="cart-item">
                    <img src="${item.image}" class="cart-item-img" alt="">
                    <div class="cart-item-info">
                        <div class="cart-item-name">${item.name}</div>
                        <div class="cart-item-meta">Size: ${item.size} / Qty: ${item.qty}</div>
                        <div class="cart-item-price">$${(item.price * item.qty).toFixed(2)}</div>
                    </div>
                </div>`).join('');
            document.getElementById('cartTotal').textContent = '$' + cart.reduce((sum, item) => sum + item.price * item.qty, 0).toFixed(2);
        }

        function toggleCart() { document.getElementById('cartDrawer').classList.toggle('open'); document.getElementById('cartOverlay').classList.toggle('open'); }
        function toggleMenu() { document.getElementById('mobileMenu').classList.toggle('open'); }

        renderShop(); updateCart();
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') { closeProduct(); document.getElementById('cartDrawer').classList.remove('open'); document.getElementById('cartOverlay').classList.remove('open'); document.getElementById('mobileMenu').classList.remove('open'); }
        });
    </script>
</body>
</html>
